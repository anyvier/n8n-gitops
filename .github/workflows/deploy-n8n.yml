name: Deploy n8n workflows
on:
  push:
    paths: ["workflows/*.json"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # НИКАКИХ jq — убрал полностью

      - name: Create workflows in n8n (always POST)
        env:
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_KEY:  ${{ secrets.N8N_API_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in workflows/*.json; do
            echo "==> POST $f to $N8N_BASE_URL/api/v1/workflows"
            echo "---- file head ----"
            head -c 200 "$f" || true
            echo -e "\n-------------------"
            # Пошлём как есть; если ответ не 2xx — покажем тело ошибки
            HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST "$N8N_BASE_URL/api/v1/workflows" \
              -H "X-N8N-API-KEY: $N8N_API_KEY" \
              -H "Content-Type: application/json" \
              --data-binary @"$f" || true)
            echo "HTTP $HTTP_CODE"
            echo "Response:"
            cat /tmp/resp.json || true
            # падать будем только если не 2xx
            case "$HTTP_CODE" in
              200|201|204) echo "OK";;
              *) echo "ERROR: HTTP $HTTP_CODE"; exit 1;;
            esac
          done
