name: Deploy n8n workflows on push

on:
  push:
    paths:
      - 'workflows/*.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List workflow files
        id: list
        run: |
          files=$(ls workflows/*.json 2>/dev/null || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upsert to n8n
        if: ${{ steps.list.outputs.files != '' }}
        env:
          N8N_URL: ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          set -e
          for f in ${{ steps.list.outputs.files }}; do
            echo "Deploy $f"
            body=$(cat "$f")
            name=$(jq -r '.name // empty' <<< "$body")
            id=$(jq -r '.id // empty' <<< "$body")
            if [ -n "$id" ]; then
              curl -sS -X PATCH "$N8N_URL/api/v1/workflows/$id" \
                -H "X-N8N-API-KEY: $N8N_API_KEY" -H "Content-Type: application/json" \
                --data "$body" >/dev/null
            else
              found=$(curl -sS "$N8N_URL/api/v1/workflows?filter=$(python3 - <<PY
import json,urllib.parse; print(urllib.parse.quote(json.dumps({"name": "$name"})))
PY
)" -H "X-N8N-API-KEY: $N8N_API_KEY")
              wf_id=$(echo "$found" | jq -r '.[0].id // empty')
              if [ -n "$wf_id" ]; then
                curl -sS -X PATCH "$N8N_URL/api/v1/workflows/$wf_id" \
                  -H "X-N8N-API-KEY: $N8N_API_KEY" -H "Content-Type: application/json" \
                  --data "$body" >/dev/null
              else
                curl -sS -X POST "$N8N_URL/api/v1/workflows" \
                  -H "X-N8N-API-KEY: $N8N_API_KEY" -H "Content-Type: application/json" \
                  --data "$body" >/dev/null
              fi
            fi
            echo "OK"
          done
