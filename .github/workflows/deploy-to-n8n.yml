name: Deploy n8n workflows on push

on:
  push:
    paths:
      - 'workflows/*.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Collect workflow files
        id: list
        shell: bash
        run: |
          shopt -s nullglob
          files=(workflows/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            printf -v joined "%s " "${files[@]}"
            echo "files=${joined% }" >> "$GITHUB_OUTPUT"
          fi

      - name: Upsert to n8n
        if: ${{ steps.list.outputs.files != '' }}
        env:
          N8N_URL: ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          for f in ${{ steps.list.outputs.files }}; do
            echo "::group::Deploy $f"
            body="$(cat "$f")"
            name="$(jq -r '.name // empty' <<<"$body")"
            id="$(jq -r '.id // empty' <<<"$body")"

            if [ -z "$name" ]; then
              echo "ERROR: file $f не содержит поле .name"; exit 1
            fi

            # Если id нет — ищем по имени среди существующих воркфлоу
            if [ -z "$id" ]; then
              echo "Ищу workflow по имени: $name"
              existing="$(curl -sS "$N8N_URL/api/v1/workflows" -H "X-N8N-API-KEY: $N8N_API_KEY")"
              id="$(jq -r --arg n "$name" '.[] | select(.name==$n) | .id' <<<"$existing" | head -n1 || true)"
            fi

            if [ -n "$id" ]; then
              echo "PATCH /workflows/$id"
              curl -sS -X PATCH "$N8N_URL/api/v1/workflows/$id" \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                --data "$body" >/dev/null
            else
              echo "POST /workflows"
              curl -sS -X POST "$N8N_URL/api/v1/workflows" \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                --data "$body" >/dev/null
            fi
            echo "::endgroup::"
          done
